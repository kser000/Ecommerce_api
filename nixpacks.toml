[phases.setup]
nixPkgs = [
  "php83",
  "php83Extensions.pdo_mysql",
  "php83Extensions.mbstring",
  "php83Extensions.xml",
  "php83Extensions.zip",
  "php83Extensions.curl",
  "php83Extensions.fileinfo",
  "php83Packages.composer"
]

[phases.install]
cmds = ["composer install --optimize-autoloader"]

[phases.build]
cmds = []

[start]
cmd = "php artisan migrate --force && php artisan l5-swagger:generate && php artisan schedule:work --no-ansi & php artisan serve --host=0.0.0.0 --port=$PORT"
