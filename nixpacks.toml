[phases.setup]
nixPkgs = [
  "php83",
  "php83Extensions.pdo_mysql",
  "php83Extensions.mbstring",
  "php83Extensions.xml",
  "php83Extensions.zip",
  "php83Extensions.curl",
  "php83Extensions.tokenizer",
  "php83Extensions.fileinfo",
  "php83Extensions.openssl",
  "composer"
]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[start]
cmd = "php artisan migrate --force && php artisan l5-swagger:generate && php artisan serve --host=0.0.0.0 --port=$PORT"
